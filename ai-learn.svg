<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0,0 10,5 0,10" fill="white"/>
    </marker>
  </defs>
  <!-- Data Box -->
  <rect x="50" y="50" width="150" height="100" fill="#2b2b3b" stroke="#fff" stroke-width="2"/>
  <text x="125" y="110" fill="#fff" font-family="Arial,Helvetica,sans-serif" font-size="18" text-anchor="middle">Data</text>
  <!-- Arrow -->
  <line x1="200" y1="100" x2="300" y2="100" stroke="#fff" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Training Box -->
  <rect x="300" y="50" width="200" height="100" fill="#2b2b3b" stroke="#fff" stroke-width="2"/>
  <text x="400" y="110" fill="#fff" font-family="Arial,Helvetica,sans-serif" font-size="18" text-anchor="middle">Training</text>
  <!-- Arrow -->
  <line x1="500" y1="100" x2="600" y2="100" stroke="#fff" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Inference Box -->
  <rect x="600" y="50" width="200" height="100" fill="#2b2b3b" stroke="#fff" stroke-width="2"/>
  <text x="700" y="110" fill="#fff" font-family="Arial,Helvetica,sans-serif" font-size="18" text-anchor="middle">Inference</text>
</svg>